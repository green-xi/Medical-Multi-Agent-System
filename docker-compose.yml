services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # 持久化 SQLite 数据库和 ChromaDB 向量库
      - ./backend/storage:/app/storage
      - ./backend/logs:/app/logs
      # 挂载 PDF 医学教材（可选）
      - ./backend/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PDF_PATH=/app/data/medical_book.pdf
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
